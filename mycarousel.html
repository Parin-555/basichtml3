<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"content="width=device-width,initial,scale=1.0">
        <title> My carousel</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="carousel-indicators">
        <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="0" class="active"></button>
        <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="1"></button>
        <button type="button" data-bs-target="#myCarousel" data-bs-slide-to="2"></button>
    </div>
    <div class="carousel-inner">
        <div class="carousel-item active">
            <img src="https://picsum.photos/800/400?random=1" class="d-block w-100" alt="Slide 1">
            <div class="carousel-caption d-none d-md-block">
                <h5>สไลด์ที่ 1</h5>
                <p>คำอธิบายสไลด์แรก</p>
            </div>
        </div>
        <div class="carousel-item">
            <img src="https://picsum.photos/800/400?random=2" class="d-block w-100" alt="Slide 2">
        </div>
        <div class="carousel-item">
            <img src="https://picsum.photos/800/400?random=3" class="d-block w-100" alt="Slide 3">
        </div>
    </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#myCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#myCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
    </button>
</div>
<div class="accordion" id="myAccordion">

    <!-- Item 1 (เปิดอยู่ตั้งแต่แรก) -->
    <div class="accordion-item">
        <h2 class="accordion-header">
            <button class="accordion-button" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#item1">
                หัวข้อที่ 1
            </button>
        </h2>
        <div id="item1" class="accordion-collapse collapse show"
             data-bs-parent="#myAccordion">
            <div class="accordion-body">
                เนื้อหาของหัวข้อที่ 1
            </div>
        </div>
    </div>

    <!-- Item 2 (ปิดอยู่) -->
    <div class="accordion-item">
        <h2 class="accordion-header">
            <button class="accordion-button collapsed" type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#item2">
                หัวข้อที่ 2
            </button>
        </h2>
        <div id="item2" class="accordion-collapse collapse"
             data-bs-parent="#myAccordion">
            <div class="accordion-body">
                เนื้อหาของหัวข้อที่ 2
            </div>
        </div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
    </html>
